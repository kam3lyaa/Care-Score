<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Score</title>
    <!--Bootstrap Css-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!--Conectando Css-->
    <link rel="stylesheet" href="css/style.css">
</head>
<body> 
    <!--Cabeçalho-->
    <header>
        <!--Barra de navegação-->
        <div class="navegacao">
            <!--Logo-->
            <div class="logo">
                <img src="assets/img/Logo Care Score.png" alt="Logo Care Score">
            </div>

            <!--Setores-->
            <nav class="setor">
                <button class="home ativa">
                    <span>
                        Home
                    </span>
                    <!--Barra Branca-->
                    <div class="fundo um"></div>
                </button>

                <button class="progresso">
                    <span>
                        Meu progresso
                    </span> 
                    <!--Barra branca-->
                    <div class="fundo dois"></div>
                </button>
            </nav>

            <!--Outros recursos-->
            <div class="recursos">
                <div class="iconRecursos">
                    <div class="armazenaCalendario">
                        <div class="calendario"></div>
                        <!--Barra braca-->
                        <div class="fundo tres"></div>
                        <!--Calendário-->
                        <div class="elementoCalendario">
                            <div class="tituloCalendario"></div>
                            <div class="diasSemanaCalendario">
                                <div>Dom</div>
                                <div>Seg</div>
                                <div>Ter</div>
                                <div>Qua</div>
                                <div>Qui</div>
                                <div>Sex</div>
                                <div>Sab</div>
                            </div>
                            <div class="gridDiasCalendario"></div>
                        </div>
                    </div>
                    
                    <div class="armazenaNotificacao">
                        <div class="notificacao"></div>
                        <!--Barra branca-->
                        <div class="fundo quatro"></div>
                        <!--Notificação-->
                        <div class="elementoNotificacao"></div>
                    </div>
                </div>

                <!--Recursos Ativos-->
                <div class="iconRecursosAtivo"></div>

                <!--Ususário-->
                <div class="usuario">
                    <div id="avatar">
                        U
                    </div>
                    <div id="nomeUsuario">
                        Usuário
                    </div>
                </div>
            </div>

        </div>
    </header>

    <!--Corpo-->
    <main>
        <!--Conteúdo da página Home-->
        <section class="pagina paginaHome ativaPagina">
            
            <div class="homePage">
                <!--Quadro de Progresso-->
                <div class="quadroDeProgresso">
                </div>

                <div class="lembreteMaisProximo">
                </div>

                <div class="mensagemDeRisco">
                </div>

                <div class="atividades">
                </div>

                <div class="mapa">
                </div>
            </div>

        </section>

        <!--Conteúdo da página Meu progresso-->
        <section class="pagina meuProgressoPage">
            <div>

            </div>
        </section>

    </main>

    <!--Rodapé-->
    <footer>

    </footer>

    <!--Bootstrap JavaScript-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <!--Conectando JavaScript-->
    <script src="js/index.js"></script>
</body>
</html>
